<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>克蘇魯的呼喚 · 氛圍音樂</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <div class="ui-panel">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <img src="image/decorate/volume.png" alt="logo" class="logo-icon" />
        <h1 class="title">克蘇魯的呼喚</h1>
      </div>
      <span class="btn-wrap">
        <button class="mute-btn" id="muteBtn">
          <img src="image/decorate/volume-on.png" class="mute-icon" alt="" />
          <span>背景靜音</span>
        </button>
      </span>
    </header>

    <!-- BGM Section -->
    <section class="bgm-section">

      <!-- Scene Selector -->
      <div class="scene-selector">
        <span class="btn-wrap">
          <button class="scene-trigger" id="sceneTrigger">
            <span class="scene-trigger-icon">♫</span>
            <span class="scene-trigger-label" id="sceneTriggerLabel">當前場景：未選擇</span>
            <span class="scene-trigger-arrow" id="sceneTriggerArrow">▾</span>
          </button>
        </span>

        <!-- Dropdown Overlay -->
        <div class="scene-dropdown" id="sceneDropdown" aria-hidden="true">
          <ul class="scene-list" id="sceneList"></ul>
        </div>
      </div>

      <!-- BGM Volume -->
      <div class="volume-row">
        <input type="range" class="volume-slider" id="bgmVolume" min="0" max="100" value="70" />
        <span class="volume-value" id="bgmVolumeValue">70%</span>
      </div>

    </section>

    <!-- SFX Section -->
    <section class="sfx-section">
      <h2 class="sfx-title">即時音效區</h2>

      <!-- Category Tabs -->
      <div class="sfx-tabs" id="sfxTabs">
        <span class="btn-wrap"><button class="sfx-tab active" data-category="environment">環境</button></span>
        <span class="btn-wrap"><button class="sfx-tab" data-category="indoor">室內</button></span>
        <span class="btn-wrap"><button class="sfx-tab" data-category="character">人物</button></span>
        <span class="btn-wrap"><button class="sfx-tab" data-category="cthulhu">克蘇魯</button></span>
      </div>

      <!-- SFX Buttons Grid -->
      <div class="sfx-grid" id="sfxGrid"></div>

      <!-- SFX Volume -->
      <div class="volume-row">
        <input type="range" class="volume-slider" id="sfxVolume" min="0" max="100" value="80" />
        <span class="volume-value" id="sfxVolumeValue">80%</span>
      </div>
    </section>

    </div><!-- /.ui-panel -->

    <!-- Click-outside overlay to close dropdown -->
    <div class="backdrop" id="backdrop"></div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
